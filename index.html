<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewTube</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e8e8}
input,select,textarea,button{font-family:inherit;font-size:13px}
input,select,textarea{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:8px;color:#e8e8e8;padding:7px 10px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#555}
select option{background:#1a1a1a}
textarea{resize:vertical;min-height:80px}
.app{max-width:880px;margin:0 auto;padding:1.5rem 1rem 4rem}
h1{font-size:18px;font-weight:600;margin-bottom:1.5rem;color:#fff}
.tab-row{display:flex;border-bottom:1px solid #222;margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:8px 15px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:#ccc}
.tab.active{color:#fff;border-bottom-color:#fff}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#1a1a1a;border:1px solid #222;border-radius:10px;padding:.9rem 1rem}
.stat-n{font-size:24px;font-weight:600;color:#fff}
.stat-l{font-size:11px;color:#666;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.6rem}
.pill{padding:4px 12px;border-radius:99px;border:1px solid #2e2e2e;font-size:12px;cursor:pointer;background:transparent;color:#888;white-space:nowrap}
.pill:hover{border-color:#555;color:#ccc}
.pill.active{background:#fff;color:#000;border-color:#fff}
.pill.tag-active{background:#2a3a2a;color:#7ec87e;border-color:#3a5a3a}
.topbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.topbar input{flex:1;min-width:180px}
.topbar select{width:130px;flex-shrink:0}
.slabel{font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.08em;margin:1.5rem 0 .5rem}
.card{background:#141414;border:1px solid #222;border-radius:10px;padding:.9rem 1rem;margin-bottom:8px}
.card:hover{border-color:#333}
.card-top{display:flex;gap:12px;align-items:flex-start}
.thumb{width:88px;height:50px;border-radius:6px;background:#1e1e1e;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#444;font-size:22px}
.thumb img{width:100%;height:100%;object-fit:cover}
.ci{flex:1;min-width:0}
.ct{font-size:14px;font-weight:500;color:#e8e8e8;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;text-decoration:none}
.ct:hover{color:#fff;text-decoration:underline}
.cm{font-size:12px;color:#666;margin-top:3px}
.cr{display:inline-block;margin-top:6px;font-size:12px;padding:2px 10px;border-radius:99px;background:#1e1e1e;border:1px solid #2a2a2a;color:#ccc}
.crv{font-size:13px;color:#888;margin-top:10px;line-height:1.65;border-top:1px solid #1e1e1e;padding-top:10px}
.ca{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.ctags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tbadge{font-size:11px;padding:2px 8px;border-radius:99px;background:#1e2e1e;border:1px solid #2a4a2a;color:#7ec87e}
.lbtn,.dlbtn{padding:4px 10px;font-size:13px;border-radius:7px;border:1px solid #2e2e2e;background:transparent;cursor:pointer;color:#666}
.lbtn:hover,.lbtn.on{background:#1a2a1a;border-color:#3a5a3a;color:#7ec87e}
.dlbtn:hover,.dlbtn.on{background:#2a1a1a;border-color:#5a3a3a;color:#e07070}
.btn{padding:6px 14px;font-size:12px;border-radius:7px;border:1px solid #2e2e2e;background:#1a1a1a;cursor:pointer;color:#ccc;white-space:nowrap}
.btn:hover{background:#222;color:#fff;border-color:#444}
.btn.primary{background:#fff;color:#000;border-color:#fff;font-weight:500}
.btn.primary:hover{background:#ddd}
.btn.danger{border-color:#3a1a1a;color:#c0392b}
.btn.danger:hover{background:#1e0a0a}
.btn.sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.af{background:#141414;border:1px solid #222;border-radius:12px;padding:1.2rem;margin-bottom:1.5rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ff{margin-bottom:10px}
label{font-size:11px;color:#666;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.ur{display:flex;gap:8px}
.ur input{flex:1}
.fs{font-size:12px;color:#666;margin-top:6px;min-height:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ftp{height:32px;border-radius:4px}
.spinner{width:12px;height:12px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#2ecc71}.dot.err{background:#e74c3c}
.rg{display:flex;flex-wrap:wrap;gap:6px}
.rc{padding:5px 12px;border-radius:99px;border:1px solid #2e2e2e;font-size:12px;cursor:pointer;background:transparent;color:#aaa}
.rc:hover{border-color:#555;color:#fff}
.rc.sel{background:#fff;color:#000;border-color:#fff}
.tc{padding:4px 10px;border-radius:99px;border:1px solid #2a4a2a;font-size:12px;cursor:pointer;background:transparent;color:#666}
.tc:hover{border-color:#3a6a3a;color:#7ec87e}
.tc.sel{background:#1e2e1e;color:#7ec87e;border-color:#3a5a3a}
.ti{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1e1e1e}
.ti:last-child{border-bottom:none}
.tt{flex:1;min-width:0}
.ttitle{font-size:13px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tch{font-size:12px;color:#555;margin-top:2px}
.empty{text-align:center;padding:4rem 1rem;color:#555;font-size:14px}
.sm{font-size:12px;color:#666;margin-top:6px;text-align:right;min-height:16px}
.hi{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1a}
.hi:last-child{border-bottom:none}
.hc{font-size:11px;color:#555;width:38px;flex-shrink:0;text-align:right}
.hb{flex:1;min-width:0}
.htitle{font-size:13px;color:#ccc;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.htitle:hover{color:#fff;text-decoration:underline}
.hch{font-size:12px;color:#555;margin-top:2px}
.chc{background:#141414;border:1px solid #222;border-radius:10px;padding:.9rem 1rem;margin-bottom:8px}
.chc:hover{border-color:#333}
.chav{width:52px;height:52px;border-radius:50%;background:#222;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#555;font-size:20px}
.chav img{width:100%;height:100%;object-fit:cover}
.chn{font-size:14px;font-weight:500;color:#e8e8e8;text-decoration:none}
.chn:hover{color:#fff;text-decoration:underline}
.chd{font-size:12px;color:#666;margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.chbadge{padding:2px 8px;border-radius:99px;font-size:10px;border:1px solid;margin-right:4px}
.chbadge.sub{color:#7ec87e;border-color:#2a4a2a;background:#1a2a1a}
.chbadge.hist{color:#7ab0e8;border-color:#2a3a5a;background:#1a2030}
.chvids{display:none;margin-top:10px;border-top:1px solid #1e1e1e;padding-top:10px}
.chvrow{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #181818}
.chvrow:last-child{border-bottom:none}
.chvthumb{width:60px;height:34px;border-radius:4px;background:#1e1e1e;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px}
.chvthumb img{width:100%;height:100%;object-fit:cover}
.chvtitle{font-size:13px;color:#ccc;text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chvtitle:hover{color:#fff;text-decoration:underline}
.sc{background:#141414;border:1px solid #2a2a4a;border-radius:10px;padding:.9rem 1rem;margin-bottom:8px}
.stog{cursor:pointer;display:flex;align-items:center;gap:8px;background:none;border:none;color:#aaa;font-size:12px;padding:0;margin-top:8px}
.stog:hover{color:#fff}
.epl{margin-top:10px;border-top:1px solid #1e1e1e;padding-top:10px;display:none}
.epi{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #181818}
.epi:last-child{border-bottom:none}
.epn{font-size:11px;color:#555;width:28px;flex-shrink:0;padding-top:2px}
.epb{flex:1;min-width:0}
.ept{font-size:13px;color:#ccc;text-decoration:none;display:block}
.ept:hover{color:#fff;text-decoration:underline}
/* Auth screen */
#auth-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f0f;display:flex;align-items:center;justify-content:center;z-index:100}
.auth-box{background:#141414;border:1px solid #222;border-radius:16px;padding:2.5rem;text-align:center;max-width:380px;width:90%}
.auth-box h2{font-size:20px;font-weight:600;color:#fff;margin-bottom:.5rem}
.auth-box p{font-size:14px;color:#666;margin-bottom:1.5rem}
.auth-box .btn{font-size:14px;padding:10px 24px;display:inline-flex;align-items:center;gap:8px}
.save-indicator{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a2a1a;border:1px solid #3a5a3a;color:#7ec87e;font-size:12px;padding:8px 14px;border-radius:8px;display:none;z-index:50}
.err-indicator{position:fixed;bottom:1.5rem;right:1.5rem;background:#2a1a1a;border:1px solid #5a3a3a;color:#e07070;font-size:12px;padding:8px 14px;border-radius:8px;display:none;z-index:50}
@media(max-width:520px){.fg{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>&#128252; ReviewTube</h2>
    <p>Sign in to access your catalogue from any device.</p>
    <button class="btn primary" onclick="signIn()">&#128100; Sign in with Google</button>
    <div style="margin-top:1rem;font-size:12px;color:#555" id="auth-msg"></div>
  </div>
</div>

<div id="save-indicator" class="save-indicator">&#10003; Saved</div>
<div id="err-indicator" class="err-indicator">&#10005; Save failed</div>

<div class="app" id="main-app" style="display:none">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
  <h1 style="margin:0">&#128252; ReviewTube</h1>
  <button class="btn sm" onclick="signOut()">Sign out</button>
</div>
<div class="tab-row">
  <button class="tab active" onclick="switchTab('browse')">Browse</button>
  <button class="tab" onclick="switchTab('add')">Add video</button>
  <button class="tab" onclick="switchTab('series')">Series</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <button class="tab" onclick="switchTab('channels')">Channels</button>
  <button class="tab" onclick="switchTab('todo')">To review</button>
  <button class="tab" onclick="switchTab('other')">Other</button>
  <button class="tab" onclick="switchTab('friends')">Friends &#127758;</button>
</div>

<div id="tab-browse">
  <div class="stat-row" id="stats"></div>
  <div class="filter-row" id="cat-filters"></div>
  <div class="filter-row" id="tag-filters"></div>
  <div class="topbar">
    <input type="text" id="search" placeholder="Search titles, channels, reviews..." oninput="renderCards()">
    <select id="year-filter" onchange="renderCards()"><option value="">All years</option></select>
    <select id="sort-mode" onchange="renderCards()">
      <option value="year">Sort: Year</option>
      <option value="recent">Sort: Recently reviewed</option>
      <option value="liked">Sort: Liked</option>
      <option value="disliked">Sort: Disliked</option>
    </select>
  </div>
  <div id="cards-container"></div>
</div>

<div id="tab-add" style="display:none">
  <div class="af">
    <div class="ff"><label>YouTube URL</label>
      <div class="ur"><input type="text" id="url-input" placeholder="https://youtube.com/watch?v=...">
        <button class="btn primary" id="fetch-btn" onclick="fetchMeta()">&#8595; Fetch</button></div>
      <div class="fs" id="fetch-status"></div></div>
    <div class="fg">
      <div><label>Title</label><input type="text" id="f-title" placeholder="Video title"></div>
      <div><label>Channel</label><input type="text" id="f-channel" placeholder="Channel name"></div>
      <div><label>Category</label>
        <div style="display:flex;gap:6px">
          <select id="f-cat" style="flex:1"></select>
          <button class="btn" onclick="toggleNewCat()" style="flex:none;padding:6px 10px">+</button>
        </div>
        <div id="new-cat-row" style="display:none;margin-top:6px">
          <div class="ur"><input type="text" id="new-cat-input" placeholder="New category..." onkeydown="if(event.key==='Enter')confirmNewCat()">
            <button class="btn primary" onclick="confirmNewCat()">Add</button>
            <button class="btn" onclick="toggleNewCat()">&#10005;</button></div></div></div>
      <div><label>Year</label><input type="number" id="f-year" value="2026" min="2000" max="2035"></div>
    </div>
    <div class="ff"><label>Tags</label>
      <div id="tag-chip-grid" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px"></div>
      <div id="new-tag-row" style="display:none;margin-bottom:6px">
        <div class="ur"><input type="text" id="new-tag-input" placeholder="New tag..." onkeydown="if(event.key==='Enter')confirmNewTag()">
          <button class="btn primary" onclick="confirmNewTag()">Add</button>
          <button class="btn" onclick="toggleNewTag()">&#10005;</button></div></div>
      <button class="btn" onclick="toggleNewTag()" style="font-size:11px;padding:3px 10px">+ new tag</button></div>
    <div class="ff">
      <label>Like</label>
      <div style="display:flex;gap:8px">
        <button class="lbtn" id="form-like-btn" onclick="toggleFormLike(true)">&#128077; Like</button>
        <button class="dlbtn" id="form-dislike-btn" onclick="toggleFormLike(false)">&#128078; Dislike</button>
        <button class="btn sm" id="form-like-clear" onclick="toggleFormLike(null)" style="display:none">Clear</button>
      </div>
    </div>
    <div class="ff"><label>Rating</label><div class="rg" id="rating-grid"></div></div>
    <div class="ff"><label>Review</label><textarea id="f-review" placeholder="Your thoughts..."></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="clearForm()">Clear</button>
      <button class="btn primary" id="save-entry-btn" onclick="saveEntry()">Save entry</button></div>
    <div class="sm" id="save-status"></div>
  </div>
</div>

<div id="tab-series" style="display:none">
  <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
    <select id="series-sort" onchange="renderSeries()" style="width:180px;flex:none">
      <option value="added">Sort: Date added</option>
      <option value="liked">Sort: Liked</option>
      <option value="disliked">Sort: Disliked</option>
      <option value="az">Sort: A&#8211;Z</option>
    </select>
    <button class="btn primary" onclick="toggleSeriesForm()" id="series-form-toggle">+ Add series</button>
  </div>
  <div class="af" id="series-form-box" style="display:none">
    <div style="font-size:13px;font-weight:500;color:#ccc;margin-bottom:10px" id="series-form-title">Add series</div>
    <div class="ff"><label>Playlist URL (optional)</label>
      <div class="ur"><input type="text" id="s-playlist-url" placeholder="https://youtube.com/playlist?list=...">
        <button class="btn primary" id="s-fetch-btn" onclick="fetchPlaylist()">&#8595; Import</button></div>
      <div class="fs" id="s-fetch-status"></div></div>
    <div class="fg">
      <div><label>Series Title</label><input type="text" id="s-title" placeholder="Series name"></div>
      <div><label>Channel</label><input type="text" id="s-channel" placeholder="Channel name"></div>
      <div><label>Category</label><select id="s-cat"></select></div>
      <div><label>Year started</label><input type="number" id="s-year" value="2026" min="2000" max="2035"></div>
    </div>
    <div class="ff"><label>Overall Rating</label><div class="rg" id="s-rating-grid"></div></div>
    <div class="ff">
      <label>Like</label>
      <div style="display:flex;gap:8px">
        <button class="lbtn" id="s-form-like-btn" onclick="toggleSeriesFormLike(true)">&#128077; Like</button>
        <button class="dlbtn" id="s-form-dislike-btn" onclick="toggleSeriesFormLike(false)">&#128078; Dislike</button>
        <button class="btn sm" id="s-form-like-clear" onclick="toggleSeriesFormLike(null)" style="display:none">Clear</button>
      </div>
    </div>
    <div class="ff"><label>Overall Review</label><textarea id="s-review" placeholder="Your thoughts on the series..."></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="clearSeriesForm()">Clear</button>
      <button class="btn primary" onclick="saveSeries()">Save series</button></div>
    <div class="sm" id="s-save-status"></div>
  </div>
  <div id="series-container"></div>
</div>

<div id="tab-history" style="display:none">
  <div style="font-size:13px;color:#666;margin-bottom:1rem">Videos you have rewatched, sorted by watch count.</div>
  <div class="topbar"><input type="text" id="hist-search" placeholder="Search history..." oninput="renderHistory()"></div>
  <div id="history-list"></div>
</div>

<div id="tab-channels" style="display:none">
  <div class="af">
    <div style="font-size:13px;font-weight:500;color:#ccc;margin-bottom:10px">Add channel</div>
    <div class="ff"><label>Channel URL</label>
      <div class="ur"><input type="text" id="ch-url-input" placeholder="https://youtube.com/@channelname">
        <button class="btn primary" id="ch-fetch-btn" onclick="fetchChannel()">&#8595; Fetch</button></div>
      <div class="fs" id="ch-fetch-status"></div></div>
    <div class="fg">
      <div><label>Channel Name</label><input type="text" id="ch-name-input" placeholder="Channel name"></div>
      <div><label>Notes</label><input type="text" id="ch-notes-input" placeholder="Optional notes"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="clearChForm()">Clear</button>
      <button class="btn primary" onclick="saveChannel()">Save channel</button></div>
    <div class="sm" id="ch-save-status"></div>
  </div>
  <div class="topbar"><input type="text" id="ch-search" placeholder="Search channels..." oninput="renderChannels()"></div>
  <div id="channels-list"></div>
</div>

<div id="tab-todo" style="display:none">
  <div class="af" style="margin-bottom:1rem"><label>Add to list</label>
    <div class="ur" style="margin-top:4px;margin-bottom:6px">
      <input type="text" id="todo-title" placeholder="Video title">
      <input type="text" id="todo-channel" placeholder="Channel" style="width:140px;flex:none"></div>
    <div class="ur"><input type="text" id="todo-url" placeholder="YouTube URL (optional)">
      <button class="btn primary" onclick="addTodo()">Add</button></div></div>
  <div id="todo-list"></div>
</div>

<div id="tab-friends" style="display:none">
  <div class="topbar">
    <input type="text" id="friends-search" placeholder="Search all reviews..." oninput="renderFriends()">
    <select id="friends-cat" onchange="renderFriends()"><option value="">All categories</option></select>
    <select id="friends-sort" onchange="renderFriends()">
      <option value="recent">Sort: Recent</option>
      <option value="liked">Sort: Liked</option>
      <option value="disliked">Sort: Disliked</option>
    </select>
  </div>
  <div id="friends-container"></div>
</div>

<div id="tab-other" style="display:none">
  <h2 style="font-size:15px;font-weight:600;color:#fff;margin-bottom:1.25rem">List of Shameless Scott the Woz Ripoffs</h2>
  <div class="af" style="margin-bottom:1rem">
    <div class="fg">
      <div><label>Channel Name</label><input type="text" id="rip-name" placeholder="Channel name"></div>
      <div><label>Channel URL</label><input type="text" id="rip-url" placeholder="https://youtube.com/@..."></div>
    </div>
    <div class="ff"><label>Notes</label><textarea id="rip-notes" placeholder="Describe the offender..."></textarea></div>
    <div class="ff"><label>Carpet</label>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="rc" id="carpet-yes" onclick="selectCarpet(true)">&#10004;&#65039; Has carpet</button>
        <button class="rc" id="carpet-no" onclick="selectCarpet(false)">&#10060; No carpet</button></div></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
      <button class="btn" onclick="clearRipoffForm()">Clear</button>
      <button class="btn primary" onclick="saveRipoff()">Save</button></div>
    <div class="sm" id="rip-save-status"></div>
  </div>
  <div id="ripoffs-list"></div>
  <div style="margin-top:2rem;border-top:1px solid #222;padding-top:1.5rem">
    <div style="font-size:13px;color:#666;margin-bottom:1rem">Export all your data as a JSON backup.</div>
    <button class="btn primary" onclick="exportData()">&#8595; Export data as JSON</button>
  </div>
</div>
</div>

dc4e", "review": "He says nothing, delivers this as if it's new information, and goes after extremely low hanging fruit targets for why youtube is bad. No coherent idea really, not worth watching at all."}, {"title": "Kawaii: Anime, Propaganda, and Soft Power Politics.", "channel": "Moon Channel", "cat": "Video Essays and Documentaries", "year": "2024", "rating": "\ud83d\udc4d", "review": "Engaging and well structured video with a very interesting topic. Know nothing about Japanese politics or history so idk how accurate his analysis is however. Seemingly well researched."}, {"title": "The Life and Death of Normalboots [FULL]", "channel": "gug", "cat": "Video Essays and Documentaries", "year": "2024", "rating": "\ud83d\udc4d", "review": "What it says on the tin. The guy is really mean to caddicarus and that won me over. An actually earnest video and not just trying to give neutral commentary and say they're all good."}, {"title": "A Complete History of Warner Bros. Movie World (1991-2024)", "channel": "latterature", "cat": "Video Essays and Documentaries", "year": "2024", "rating": "\ud83d\udc4d", "review": "Was shocked to find a good theme park essay about a place I've actually been. Even if you haven't been, a pretty entertaining romp and a good history of the aussie theme park that has probably the most to say about it. Lively and fun commentary that keeps the video from feeling boring."}, {"title": "Crash Twinsanity - Speedrunning's Hidden Gem", "channel": "KylieKyubi", "cat": "Video Essays and Documentaries", "year": "2024", "rating": "\ud83d\udc4d", "review": "One of the odd, unfinished games I had growing up. Really fun to see it broken apart, interesting speedrun, interesting history. Somewhat dry commentary, and some unnecessary segments of epic music playing over speedrun footage."}, {"title": "The Dark Reality of Japanese Host Clubs", "channel": "Nil Nilgiree", "cat": "Video Essays and Documentaries", "year": "2024", "rating": "\ud83d\udc4d", "review": "This one was alright. A well structured look at a seedy and insidious industry."}, {"title": "The Speedrun History of Sonic 06", "channel": "RyMoSwag", "cat": "Video Essays and Documentaries", "year": "2024", "rating": "Too easy, piece of cake!", "review": "Normally a channel forcing in a bunch of little skits and dated jokes about Sonic 06 into a video like this would piss me off, but these guys are pretty charming. Good history good pacing good editing. Pretty low production quality but honestly who gives a shit."}, {"title": "The Future is a Dead Mall - Decentraland and the Metaverse", "channel": "Folding Ideas", "cat": "Video Essays and Documentaries", "year": "2023", "rating": "good it's a good video it's quite good", "review": "Another Dan Olsen banger, although I find this one a little boring compared to some of his later videos. Still very good."}, {"title": "Can we rescue a deleted Pok\u00e9mon - 15 years after its death?", "channel": "Nick Robinson", "cat": "Video Essays and Documentaries", "year": "2022", "rating": "yeah you could put this on while you eat lunch and be satisfied", "review": "I'm not particularly a fan of Nick Robinson, but I think this is one of his best despite being one of the smallest in scope. It's easy to relate to and sympathise with our protagonist, trying to recover his childhood Pokemon, and the expert brought in dishes out a lot of really interesting in depth knowledge about corrupted pokemon and how FRLG handles Pokemon ID data. Captivating."}, {"title": "The Rise and Fall Of Pok\u00e9mon's Region Design", "channel": "Internet Pitstop", "cat": "Video Essays and Documentaries", "year": "2022", "rating": "\ud83c\udf08", "review": "Very strong and well-presented analysis articulating something I've been feeling for a while now. Provides good examples and spells out a solid critique of how the world design has declined, and why it's important in the first place. The greenscreen guy gimmick has been done a lot and he apes a lot from NakeyJakeys style, but it looks good and is all presented quite well."}, {"title": "Leitmotifs in Sonic", "channel": "Altheboi", "cat": "Video Essays and Documentaries", "year": "2022", "rating": "\ud83c\udfb6", "review": "One of the best Sonic videos out there. Really good spotlight on one of the most important aspects of the series musical identity. Taught me some stuff when I first saw it."}, {"title": "The 10-Year Hunt for the Lost McDonald's DS Game", "channel": "Nick Robinson", "cat": "Video Essays and Documentaries", "year": "2020", "rating": "\ud83d\udc4d", "review": "Easily Nick's best video and it's no surprise this one blew up the most. Interesting topic, and tells an interesting story about the journey to get there."}, {"title": "Spyro: Enter the Dragonfly Documentary", "channel": "Mr. FO1", "cat": "Video Essays and Documentaries", "year": "2019", "rating": "party rock is in the house tonight", "review": "(This series actually ran through 2020) Autistic guy takes it upon himself to compile as much beta and production content as possible about a shitty rushed game from his childhood and gets several ex-developers to speak on the record. Shockingly they actually give a bunch of really interesting insights into what a nightmare production was. Good story, but his desire to be comprehensive results in a lot of what is effectively dead air as he plays extensive compilations of cut music and voice lines, so you get interrupted with 5 minutes of hearing hunter saying shit like \"here you can select your language\" when you were enjoying the video."}, {"title": "The World Record History of Super Mario Sunshine", "channel": "Averagetrey", "cat": "Video Essays and Documentaries", "year": "2018", "rating": "\ud83d\ude4f", "review": "Averagetrey's Sunshine histories are perhaps the best speedrun documentaries out there in my opinion. He's entertaining, fun, and his personal history with the game gives him a great understanding of the run and its background."}, {"tit ": "Do Not Enter The Game Industry.", "channel": "final V3", "cat": "Commentaries and Reviews", "year": "2024", "rating": "\ud83d\udc4d", "review": "Interesting and entertaining podcast about some first hand experiences in the game industry."}, {"title": "Don't Let Video Game Collecting Ruin Your Life", "channel": "Heckin' Steve", "cat": "Commentaries and Reviews", "year": "2024", "rating": "\ud83d\udc4d", "review": "Earnest advice and reflection from a guy with a moderately sized collection. Feels like an old school youtube video, just a dude sharing some of his thoughts and feelings on a topic."}, {"title": "Swollen Pickles: Web of Falsity", "channel": "Friendlyjordies Podcast", "cat": "Commentaries and Reviews", "year": "2024", "rating": "\ud83d\udc4d", "review": "I think this one only appeals to me specifically."}, {"title": "The Comprehensive Roast of Total Drama All-Stars", "channel": "Switch1e", "cat": "Commentaries and Reviews", "year": "2024", "rating": "yeah it was alright", "review": "Quinton Reviews style deep dive retrospective. High effort, spends too much time recapping events of the show, but still contains some actual critique. It's good at what it does, but no one needs to watch a four hour recap of a forgettable season nobody watched of an old cartoon."}, {"title": "Collecting A Wii U in 2025: Is It Worth It?", "channel": "MeMelon", "cat": "Commentaries and Reviews", "year": "2024", "rating": "Background noise", "review": "I'm pretty sure Scott the Woz has already made this video, multiple times. The guy is also just doing a straight up Scott the Woz impression, but faster paced. I didn't really listen to what he said it's just the scott wii u video but not as good. This goes for all his videos really."}, {"title": "The Starbomb Retrospective", "channel": "NoMad", "cat": "Commentaries and Reviews", "year": "2024", "rating": "...huh?", "review": "It's a fine retrospective and not something I'd ever think of making. Just weird to hear someone talk a // Raw Supabase REST API helpers - no SDK needed
async function sbFetch(method, path, body){
  var opts={method:method,headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+(currentToken||SUPA_KEY),'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(SUPA_URL+'/rest/v1/'+path,opts);
  var text=await res.text();
  try{return{data:text?JSON.parse(text):null,error:res.ok?null:{message:text}};}
  catch(e){return{data:null,error:{message:text}};}
}
async function sbAuth(method,path,body){
  var opts={method:method,headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(SUPA_URL+'/auth/v1/'+path,opts);
  var text=await res.text();
  try{return JSON.parse(text);}catch(e){return null;}
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function signIn(){
  document.getElementById('auth-msg').textContent='Redirecting to Google...';
  window.location.href=SUPA_URL+'/auth/v1/authorize?provider=google&redirect_to='+encodeURIComponent(window.location.href.split('#')[0]);
}

async function signOut(){
  await fetch(SUPA_URL+'/auth/v1/logout',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+currentToken}});
  currentToken=null;currentUser=null;
  localStorage.removeItem('sb_token');
  location.reload();
}

async function initAuth(){
  // Check for token in URL hash (after OAuth redirect)
  var hash=window.location.hash;
  if(hash&&hash.includes('access_token')){
    var params=new URLSearchParams(hash.slice(1));
    var token=params.get('access_token');
    if(token){
      localStorage.setItem('sb_token',token);
      history.replaceState(null,'',window.location.pathname+window.location.search);
    }
  }
  // Check stored token
  var stored=localStorage.getItem('sb_token');
  if(stored){
    var res=await fetch(SUPA_URL+'/auth/v1/user',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+stored}});
    if(res.ok){
      currentToken=stored;
      currentUser=await res.json();
      showApp();
      await loadAllData();
      return;
    } else {
      localStorage.removeItem('sb_token');
    }
  }
  document.getElementById('auth-screen').style.display='flex';
}
function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
}

  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── SUPABASE HELPERS ─────────────────────────────────────────────────────────
function uid(){return currentUser&&currentUser.id;}

async function dbUpsert(table,row,isEdit){
  var r;
  if(isEdit){
    r=await sbFetch('PATCH',table+'?id=eq.'+row.id+'&user_id=eq.'+row.user_id,row);
  } else {
    r=await sbFetch('POST',table,row);
  }
  if(r.error)showErr(r.error.message);
  else showSaved();
  return !r.error;
}

async function dbDelete(table,id){
  var r=await sbFetch('DELETE',table+'?id=eq.'+id+'&user_id=eq.'+uid(),null);
  if(r.error)showErr(r.error.message);
  return !r.error;
}

async function dbLoad(table){
  var r=await sbFetch('GET',table+'?user_id=eq.'+uid()+'&limit=10000',null);
  if(r.error){console.error(r.error);return [];}
  return r.data||[];
}

// ── LOAD ALL DATA ─────────────────────────────────────────────────────────────
async function loadAllData(){
  document.getElementById('cards-container').innerHTML='<div class="empty">Loading...</div>';
  var uid_val=uid();

  // Load all tables in parallel
  var results=await Promise.all([
    dbLoad('entries'),
    dbLoad('todos'),
    dbLoad('ripoffs'),
    dbLoad('series'),
    dbLoad('history_items'),
    dbLoad('channels'),
    sbFetch('GET','user_prefs?user_id=eq.'+uid_val+'&limit=1',null)
  ]);

  var rawEntries=results[0];
  var rawTodos=results[1];
  ripoffs=results[2];
  series=results[3];
  var rawHist=results[4];
  var rawChannels=results[5];
  var prefsArr=results[6].data||[];var prefs=prefsArr[0]||null;

  // Convert from DB format
  entries=rawEntries.map(function(r){return {
    id:r.id,title:r.title,channel:r.channel||'',cat:r.cat||'',year:r.year||'',
    rating:r.rating||'',review:r.review||'',thumb:r.thumb||'',url:r.url||'',
    published:r.published||'',desc:r.description||'',tags:r.tags||[],
    liked:r.liked,reviewedAt:r.reviewed_at
  };});

  todos=rawTodos.map(function(r){return {id:r.id,title:r.title,channel:r.channel||'',url:r.url||''};});

  histItems=rawHist.map(function(r){return {id:r.id,title:r.title,url:r.url||'',channel:r.channel||'',watches:r.watches||0,done:r.done||false};});

  channels=rawChannels.map(function(r){return {id:r.id,name:r.name,url:r.url||'',notes:r.notes||'',avatar:r.avatar||'',desc:r.descr||'',watches:r.watches||0,fromSubs:r.from_subs||false,fromHistory:r.from_history||false};});

  if(prefs){
    cats=prefs.cats||DEFAULT_CATS.slice();
    tags=prefs.tags||[];
  } else {
    cats=DEFAULT_CATS.slice();
    tags=[];
  }

  // Seed (create prefs) if first time user
  if(!prefs&&!_seeded){
    _seeded=true;
    await seedAll();
    return;
  }

  renderAll();
}

  await sbFetch('POST','user_prefs?on_conflict=user_id',{user_id:u,cats:DEFAULT_CATS,tags:[]});

  _thumb='https://img.youtube.com/vi/'+vid+'/mqdefault.jpg';
  _url='https://www.youtube.com/watch?v='+vid;
  setFS('fetch-status','loading','Fetching...',_thumb);
  document.getElementById('fetch-btn').disabled=true;
  try{
    var res=await fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet&id='+vid+'&key='+YT_KEY);
    var d=await res.json();if(d.error)throw new Error(d.error.message);
    var item=d.items&&d.items[0];if(!item)throw new Error('Not found.');
    var s=item.snippet;var pub=new Date(s.publishedAt);
    document.getElementById('f-title').value=s.title;
    document.getElementById('f-channel').value=s.channelTitle;
    document.getElementById('f-year').value=pub.getFullYear();
    _thumb=(s.thumbnails.medium&&s.thumbnails.medium.url)||(s.thumbnails.default&&s.thumbnails.default.url)||_thumb;
    _pub=pub.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
    _desc=s.description?s.description.slice(0,500):'';
    setFS('fetch-status','success',s.channelTitle+' · '+_pub,_thumb);
  }catch(e){setFS('fetch-status','error','Thumbnail saved — fill title/channel manually.',_thumb);}
  finally{document.getElementById('fetch-btn').disabled=false;}
}

async function fetchPlaylist(){
  var url=document.getElementById('s-playlist-url').value.trim();if(!url)return;
  var pid=extractPid(url);if(!pid){setFS('s-fetch-status','error','Could not parse playlist ID.');return;}
  setFS('s-fetch-status','loading','Fetching...');document.getElementById('s-fetch-btn').disabled=true;
  try{
    var res=await fetch('https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId='+pid+'&key='+YT_KEY);
    var d=await res.json();if(d.error)throw new Error(d.error.message);
    window._pendingEps=(d.items||[]).map(function(item,i){return {id:Date.now()+i,title:item.snippet.title,url:'https://www.youtube.com/watch?v='+((item.snippet.resourceId&&item.snippet.resourceId.videoId)||''),note:''};});
    var ch=(d.items&&d.items[0]&&d.items[0].snippet&&d.items[0].snippet.channelTitle)||'';
    if(ch&&!document.getElementById('s-channel').value)document.getElementById('s-channel').value=ch;
    setFS('s-fetch-status','success','Imported '+window._pendingEps.length+' episodes.');
  }catch(e){window._pendingEps=null;setFS('s-fetch-status','error','Import failed.');}
  finally{document.getElementById('s-fetch-btn').disabled=false;}
}

async function fetchChannel(){
  var url=document.getElementById('ch-url-input').value.trim();if(!url)return;
  setFS('ch-fetch-status','loading','Fetching...');document.getElementById('ch-fetch-btn').disabled=true;
  _chAvatar=null;_chDesc='';
  try{
    var u=new URL(url);var parts=u.pathname.split('/').filter(Boolean);
    var chId=null;
    if(parts[0]==='channel'){chId=parts[1];}
    else{
      var handle=parts[0]&&parts[0].startsWith('@')?parts[0].slice(1):parts[0];
      var r=await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet&forHandle='+handle+'&key='+YT_KEY);
      var dd=await r.json();if(dd.error)throw new Error(dd.error.message);
      chId=dd.items&&dd.items[0]&&dd.items[0].id;
    }
    if(!chId)throw new Error('Could not resolve channel.');
    var r2=await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet&id='+chId+'&key='+YT_KEY);
    var d2=await r2.json();if(d2.error)throw new Error(d2.error.message);
    var ch=d2.items&&d2.items[0]&&d2.items[0].snippet;if(!ch)throw new Error('Not found.');
    document.getElementById('ch-name-input').value=ch.title||'';
    _chAvatar=(ch.thumbnails&&((ch.thumbnails.medium&&ch.thumbnails.medium.url)||(ch.thumbnails.default&&ch.thumbnails.default.url)))||'';
    _chDesc=ch.description?ch.description.slice(0,300):'';
    setFS('ch-fetch-status','success',ch.title,_chAvatar);
  }catch(e){setFS('ch-fetch-status','error','Fetch failed — fill name manually.');}
  finally{document.getElementById('ch-fetch-btn').disabled=false;}
}

  var used=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.tags||[]);},[])));
  document.getElementById('tag-filters').innerHTML=used.map(function(t){return '<button class="pill'+(activeTag===t?' tag-active':'')+'" data-tag="'+t.replace(/"/g,'&quot;')+'" onclick="setTagFilter(this.dataset.tag)">'+t+'</button>';}).join('');

function renderYearFilter(){
  var years=Array.from(new Set(entries.map(function(e){return e.year;}))).sort().reverse();
  var cur=document.getElementById('year-filter').value;
  document.getElementById('year-filter').innerHTML='<option value="">All years</option>'+years.map(function(y){return '<option value="'+y+'"'+(y===cur?' selected':'')+'>'+y+'</option>';}).join('');
}

function renderCards(){
  var search=document.getElementById('search').value.toLowerCase();
  var year=document.getElementById('year-filter').value;
  var sortMode=document.getElementById('sort-mode').value;
  var filtered=entries.filter(function(e){
    if(activeCat!=='All'&&e.cat!==activeCat)return false;
    if(year&&e.year!==year)return false;
    if(activeTag&&(e.tags||[]).indexOf(activeTag)<0)return false;
    if(search&&(e.title+e.channel+(e.review||'')+(e.rating||'')).toLowerCase().indexOf(search)<0)return false;
    return true;
  });
  if(sortMode==='recent'){
    filtered.sort(function(a,b){return (b.reviewedAt||0)-(a.reviewedAt||0);});
    document.getElementById('cards-container').innerHTML=!filtered.length?'<div class="empty">No videos found.</div>':filtered.map(cardHTML).join('');
    return;
  } else if(sortMode==='liked'){
    filtered=filtered.filter(function(e){return e.liked===true;});
    filtered.sort(function(a,b){return (b.reviewedAt||0)-(a.reviewedAt||0);});
    document.getElementById('cards-container').innerHTML=!filtered.length?'<div class="empty">No liked videos.</div>':filtered.map(cardHTML).join('');
    return;
  } else if(sortMode==='disliked'){
    filtered=filtered.filter(function(e){return e.liked===false;});
    filtered.sort(function(a,b){return (b.reviewedAt||0)-(a.reviewedAt||0);});
    document.getElementById('cards-container').innerHTML=!filtered.length?'<div class="empty">No disliked videos.</div>':filtered.map(cardHTML).join('');
    return;
  }
  filtered.sort(function(a,b){return b.year-a.year||a.title.localeCompare(b.title);});
  var grouped={};
  filtered.forEach(function(e){var k=e.year+'||'+e.cat;if(!grouped[k])grouped[k]={cat:e.cat,year:e.year,items:[]};grouped[k].items.push(e);});
  var keys=Object.keys(grouped).sort(function(a,b){return b.split('||')[0]-a.split('||')[0];});
  document.getElementById('cards-container').innerHTML=!keys.length?'<div class="empty">No videos found.</div>':keys.map(function(k){var g=grouped[k];return '<div class="slabel">'+g.cat+' — '+g.year+'</div>'+g.items.map(cardHTML).join('');}).join('');
}

function cardHTML(e){
  var thumb=e.thumb?'<div class="thumb"><img src="'+esc(e.thumb)+'" onerror="this.parentElement.textContent=String.fromCodePoint(9654)"></div>':'<div class="thumb">&#9654;</div>';
  var title=e.url?'<a class="ct" href="'+esc(e.url)+'" target="_blank">'+esc(e.title)+'</a>':'<span class="ct">'+esc(e.title)+'</span>';
  var tagHtml=(e.tags&&e.tags.length)?'<div class="ctags">'+e.tags.map(function(t){return '<span class="tbadge">'+esc(t)+'</span>';}).join('')+'</div>':'';
  var lo=e.liked===true?' on':'';var dlo=e.liked===false?' on':'';
  var reviewedStr=e.reviewedAt?(' · <span style="color:#444">reviewed '+new Date(e.reviewedAt).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+'</span>'):'';
  return '<div class="card"><div class="card-top">'+thumb+'<div class="ci">'+title+'<div class="cm">'+esc(e.channel||'')+(e.published?' · '+esc(e.published):'')+reviewedStr+'</div>'+(e.rating?'<span class="cr">'+esc(e.rating)+'</span>':'')+tagHtml+'</div></div>'+(e.review?'<div class="crv">'+esc(e.review)+'</div>':'')+'<div class="ca"><button class="lbtn'+lo+'" onclick="likeToggle('+e.id+',true)">&#128077;</button><button class="dlbtn'+dlo+'" onclick="likeToggle('+e.id+',false)">&#128078;</button><button class="btn sm" onclick="editEntry('+e.id+')">&#9999; Edit</button><button class="btn sm danger" onclick="deleteEntry('+e.id+')">&#10005; Delete</button></div></div>';
}

  var row={
    id:_editId||now, user_id:uid(), title:title,
    channel:document.getElementById('f-channel').value.trim(),
    cat:document.getElementById('f-cat').value,
    year:document.getElementById('f-year').value,
    rating:selRating, review:document.getElementById('f-review').value.trim(),

  };

  s.episodes=(s.episodes||[]).filter(function(e){return e.id!==eid;});
  await sbFetch('PATCH','series?id=eq.'+sid+'&user_id=eq.'+uid(),{episodes:s.episodes});
  renderSeries();setTimeout(function(){var el=document.getElementById('eps-'+sid);if(el)el.style.display='block';},50);
}
async function saveEpNote(sid,eid,val){
  var s=series.find(function(x){return x.id===sid;});if(!s)return;
  var ep=(s.episodes||[]).find(function(e){return e.id===eid;});if(ep){ep.note=val;await sbFetch('PATCH','series?id=eq.'+sid+'&user_id=eq.'+uid(),{episodes:s.episodes});}
}
function toggleSeriesLike(id,val){
  var s=series.find(function(x){return x.id===id;});if(!s)return;
  s.liked=s.liked===val?null:val;
  sbFetch('PATCH','series?id=eq.'+id+'&user_id=eq.'+uid(),{liked:s.liked});
  renderSeries();
}

function renderSeries(){
  renderStats();
  var con=document.getElementById('series-container');
  if(!series.length){con.innerHTML='<div class="empty">No series yet.</div>';return;}
  var sortMode=document.getElementById('series-sort')?document.getElementById('series-sort').value:'added';
  var sorted=series.slice();
  if(sortMode==='liked') sorted=sorted.filter(function(s){return s.liked===true;});
  else if(sortMode==='disliked') sorted=sorted.filter(function(s){return s.liked===false;});
  else if(sortMode==='az') sorted.sort(function(a,b){return a.title.localeCompare(b.title);});
  if(!sorted.length){con.innerHTML='<div class="empty">No series match this filter.</div>';return;}
  con.innerHTML=sorted.map(function(s){
    var eps=s.episodes||[];
    var ephtml=eps.map(function(ep,i){
      var t=ep.url?'<a class="ept" href="'+esc(ep.url)+'" target="_blank">'+esc(ep.title)+'</a>':'<span class="ept" style="cursor:default">'+esc(ep.title)+'</span>';
      return '<div class="epi"><div class="epn">'+(i+1)+'</div><div class="epb">'+t+'<div style="margin-top:3px"><input type="text" value="'+esc(ep.note||'')+'" placeholder="Quick note..." style="background:#0f0f0f;border:1px solid #1e1e1e;border-radius:6px;color:#888;font-size:12px;padding:3px 7px;width:100%" onchange="saveEpNote('+s.id+','+ep.id+',this.value)"></div></div><button class="btn sm danger" onclick="delEp('+s.id+','+ep.id+')">&#10005;</button></div>';
    }).join('');
    var addep='<div style="margin-top:10px;padding-top:8px;border-top:1px solid #1e1e1e"><div style="font-size:11px;color:#555;margin-bottom:6px">ADD EPISODE</div><div class="ur" style="margin-bottom:6px"><input type="text" id="ept-'+s.id+'" placeholder="Episode title" onkeydown="if(event.key===`Enter`)addEp('+s.id+')"></div><div class="ur"><input type="text" id="epu-'+s.id+'" placeholder="YouTube URL (optional)" onkeydown="if(event.key===`Enter`)addEp('+s.id+')"><button class="btn sm primary" onclick="addEp('+s.id+')">Add</button></div></div>';
    // Thumbnail from first episode
    var thumbEl;
    var fe=eps[0];
    if(fe&&fe.url){
      var m=fe.url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(m) thumbEl='<div class="thumb" style="width:88px;height:50px;flex-shrink:0;border-radius:6px"><img src="https://img.youtube.com/vi/'+m[1]+'/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.textContent=String.fromCodePoint(128250)"></div>';
      else thumbEl='<div style="font-size:22px;width:88px;height:50px;background:#1e1e2e;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#128250;</div>';
    } else {
      thumbEl='<div style="font-size:22px;width:88px;height:50px;background:#1e1e2e;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#128250;</div>';
    }
    var lo=s.liked===true?' on':'';
    var dlo=s.liked===false?' on':'';
    return '<div class="sc">'+
      '<div class="card-top">'+thumbEl+
      '<div class="ci">'+
        '<span class="ct" style="cursor:default">'+esc(s.title)+'</span>'+
        '<div class="cm">'+(s.channel?esc(s.channel):'')+(s.year?' · '+s.year:'')+(eps.length?' · '+eps.length+' ep':'')+'</div>'+
        (s.rating?'<span class="cr">'+esc(s.rating)+'</span>':'')+
      '</div></div>'+
      (s.review?'<div class="crv">'+esc(s.review)+'</div>':'')+
      '<div class="ca">'+
        '<button class="lbtn'+lo+'" onclick="toggleSeriesLike('+s.id+',true)">&#128077;</button>'+
        '<button class="dlbtn'+dlo+'" onclick="toggleSeriesLike('+s.id+',false)">&#128078;</button>'+
        '<button class="stog" onclick="toggleEps('+s.id+')">&#9656; Episodes ('+eps.length+')</button>'+
        '<button class="btn sm" onclick="editSeries('+s.id+')">&#9999; Edit</button>'+
        '<button class="btn sm danger" onclick="deleteSeries('+s.id+')">&#10005; Delete</button>'+
      '</div>'+
      '<div class="epl" id="eps-'+s.id+'">'+(ephtml||'<div style="color:#555;font-size:13px;padding:6px 0">No episodes yet.</div>')+addep+'</div>'+
    '</div>';
  }).join('');
}


// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory(){
  var search=document.getElementById('hist-search').value.toLowerCase();
  var vis=histItems.filter(function(h){return !h.done&&(!search||(h.title+h.channel).toLowerCase().indexOf(search)>=0);});
  var done=histItems.filter(function(h){return h.done&&(!search||(h.title+h.channel).toLowerCase().indexOf(search)>=0);});
  var html=vis.map(histHTML).join('')+(done.length?'<div class="slabel" style="margin-top:1.5rem">Dismissed ('+done.length+')</div>'+done.map(histHTML).join(''):'');
  document.getElementById('history-list').innerHTML=html||'<div class="empty">Nothing here.</div>';
}
function histHTML(h){
  return '<div class="hi" style="'+(h.done?'opacity:.4':'')+'"><div class="hc">'+h.watches+'x</div><div class="hb"><a class="htitle" href="'+h.url+'" target="_blank">'+h.title+'</a><div class="hch">'+h.channel+'</div></div><button class="btn sm" onclick="hToTodo('+h.id+')">+ To Review</button><button class="btn sm primary" onclick="hToAdd('+h.id+')">+ Catalogue</button><button class="btn sm" onclick="hDismiss('+h.id+')">'+(h.done?'&#8617;':'&#10005;')+'</button></div>';
}
async function hToTodo(id){
  var h=histItems.find(function(x){return x.id===id;});if(!h)return;
  var row={id:Date.now(),user_id:uid(),title:h.title,channel:h.channel,url:h.url};
  var ok=await dbUpsert('todos',row,false);
  if(ok){todos.push(row);renderTodos();renderStats();hDismiss(id);}
}
function hToAdd(id){var h=histItems.find(function(x){return x.id===id;});if(!h)return;switchTab('add');document.getElementById('f-title').value=h.title;document.getElementById('f-channel').value=h.channel;document.getElementById('url-input').value=h.url;_url=h.url;var vid=extractVid(h.url);if(vid)_thumb='https://img.youtube.com/vi/'+vid+'/mqdefault.jpg';hDismiss(id);}
async function hDismiss(id){
  var h=histItems.find(function(x){return x.id===id;});if(!h)return;
  h.done=!h.done;
  await sbFetch('PATCH','history_items?id=eq.'+id+'&user_id=eq.'+uid(),{done:h.done});
  renderHistory();
}

// ── CHANNELS ──────────────────────────────────────────────────────────────────
function clearChForm(){['ch-url-input','ch-name-input','ch-notes-input'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('ch-fetch-status').innerHTML='';document.getElementById('ch-save-status').textContent='';_chAvatar=null;_chId=null;_chDesc='';}
async function saveChannel(){
  var name=document.getElementById('ch-name-input').value.trim();if(!name){document.getElementById('ch-save-status').textContent='Please enter a name.';return;}
  var row={id:_chId||Date.now(),user_id:uid(),name:name,url:document.getElementById('ch-url-input').value.trim(),notes:document.getElementById('ch-notes-input').value.trim(),avatar:_chAvatar||'',descr:_chDesc||'',watches:0,from_subs:false,from_history:false};
  var ok=await dbUpsert('channels',row,!!_chId);
  if(!ok)return;
  var ch=Object.assign({},row,{desc:row.descr});
  if(_chId)channels=channels.map(function(c){return c.id===_chId?ch:c;});else channels.unshift(ch);
  clearChForm();document.getElementById('ch-save-status').textContent='Saved!';renderChannels();renderStats();
}
async function deleteChannel(id){
  if(!confirm('Remove?'))return;
  var ok=await dbDelete('channels',id);
  if(ok){channels=channels.filter(function(c){return c.id!==id;});renderChannels();renderStats();}
}
function toggleChVids(id){
  var el=document.getElementById('chv-'+id);if(!el)return;
  var open=el.style.display==='block';el.style.display=open?'none':'block';
  var btn=document.getElementById('chvbtn-'+id);if(btn)btn.textContent=open?'Show reviews':'Hide reviews';
}
function renderChannels(){
  var search=document.getElementById('ch-search').value.toLowerCase();
  var filtered=channels.filter(function(c){return !search||(c.name||'').toLowerCase().indexOf(search)>=0;});
  filtered.sort(function(a,b){return (b.watches||0)-(a.watches||0)||a.name.localeCompare(b.name);});
  var byChannel={};
  entries.forEach(function(e){var k=e.channel.toLowerCase();if(!byChannel[k])byChannel[k]=[];byChannel[k].push(e);});
  document.getElementById('channels-list').innerHTML=!filtered.length?'<div class="empty">No channels.</div>':filtered.map(function(c){
    var ces=(byChannel[c.name.toLowerCase()]||[]).slice().sort(function(a,b){return b.year-a.year;});
    var rc=ces.length;
    var avatar=c.avatar?'<img src="'+c.avatar+'" onerror="this.parentElement.textContent=String.fromCodePoint(128250)">':'&#128250;';
    var nameEl=c.url?'<a class="chn" href="'+c.url+'" target="_blank" onclick="event.stopPropagation()">'+c.name+'</a>':'<span class="chn">'+c.name+'</span>';
    var subB=c.fromSubs||c.from_subs?'<span class="chbadge sub">Subscribed</span>':'';
    var histB=(c.fromHistory||c.from_history||c.watches>0)?'<span class="chbadge hist">'+c.watches+' watches</span>':'';
    var revB=rc?'<span style="font-size:11px;color:#7ec87e">'+rc+' reviewed</span>':'';
    var vrows=ces.map(function(e){
      var vt=e.thumb?'<img src="'+e.thumb+'" onerror="this.parentElement.textContent=String.fromCodePoint(9654)" style="width:100%;height:100%;object-fit:cover">':'&#9654;';
      var vn=e.url?'<a class="chvtitle" href="'+e.url+'" target="_blank">'+e.title+'</a>':'<span class="chvtitle">'+e.title+'</span>';
      var vr=e.rating?'<span style="font-size:11px;padding:1px 8px;border-radius:99px;background:#1e1e1e;border:1px solid #2a2a2a;color:#aaa">'+e.rating+'</span>':'';
      return '<div class="chvrow"><div class="chvthumb">'+vt+'</div><div style="flex:1;min-width:0">'+vn+'<div style="display:flex;gap:8px;margin-top:3px;align-items:center">'+vr+'<span style="font-size:11px;color:#555">'+e.year+'</span></div></div></div>';
    }).join('');
    var toggleBtn=rc?'<button class="btn sm" id="chvbtn-'+c.id+'" onclick="toggleChVids('+c.id+')">Show reviews</button>':'';
    return '<div class="chc"><div style="display:flex;gap:14px;align-items:flex-start"><div class="chav">'+avatar+'</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">'+nameEl+subB+histB+revB+'</div>'+(c.desc||c.descr?'<div class="chd">'+(c.desc||c.descr)+'</div>':'')+(c.notes?'<div class="chd" style="color:#aaa;margin-top:4px">'+c.notes+'</div>':'')+'<div style="display:flex;gap:6px;margin-top:8px">'+toggleBtn+'<button class="btn sm danger" onclick="deleteChannel('+c.id+')">&#10005;</button></div></div></div>'+(rc?'<div class="chvids" id="chv-'+c.id+'">'+vrows+'</div>':'')+'</div>';
  }).join('');
}

// ── TODOS ─────────────────────────────────────────────────────────────────────
function renderTodos(){
  document.getElementById('todo-list').innerHTML=!todos.length?'<div class="empty">Nothing in your to-review list.</div>':todos.map(function(t){
    var te=t.url?'<a class="ttitle" href="'+t.url+'" target="_blank" style="color:#ccc;text-decoration:none" onmouseover="this.style.textDecoration=`underline`" onmouseout="this.style.textDecoration=`none`">'+t.title+'</a>':'<div class="ttitle">'+t.title+'</div>';
    return '<div class="ti"><div class="tt">'+te+(t.channel?'<div class="tch">'+t.channel+'</div>':'')+'</div><button class="btn sm" onclick="promoteReview('+t.id+')">&#9999; Review</button><button class="btn sm danger" onclick="delTodo('+t.id+')">&#10005;</button></div>';
  }).join('');
}
async function addTodo(){
  var t=document.getElementById('todo-title').value.trim();if(!t)return;
  var row={id:Date.now(),user_id:uid(),title:t,channel:document.getElementById('todo-channel').value.trim(),url:document.getElementById('todo-url').value.trim()};
  var ok=await dbUpsert('todos',row,false);
  if(ok){todos.push(row);['todo-title','todo-channel','todo-url'].forEach(function(id){document.getElementById(id).value='';});renderTodos();renderStats();}
}
async function delTodo(id){
  var ok=await dbDelete('todos',id);
  if(ok){todos=todos.filter(function(t){return t.id!==id;});renderTodos();renderStats();}
}
function promoteReview(id){var t=todos.find(function(x){return x.id===id;});if(!t)return;delTodo(id);switchTab('add');document.getElementById('f-title').value=t.title;document.getElementById('f-channel').value=t.channel||'';document.getElementById('url-input').value=t.url||'';if(t.url){_url=t.url;var vid=extractVid(t.url);if(vid)_thumb='https://img.youtube.com/vi/'+vid+'/mqdefault.jpg';}renderStats();}

// ── RIPOFFS ───────────────────────────────────────────────────────────────────
function selectCarpet(val){_carpet=val;document.getElementById('carpet-yes').classList.toggle('sel',val===true);document.getElementById('carpet-no').classList.toggle('sel',val===false);}
function clearRipoffForm(){['rip-name','rip-url','rip-notes'].forEach(function(id){document.getElementById(id).value='';});_carpet=null;_ripId=null;document.getElementById('carpet-yes').classList.remove('sel');document.getElementById('carpet-no').classList.remove('sel');document.getElementById('rip-save-status').textContent='';}
async function saveRipoff(){
  var name=document.getElementById('rip-name').value.trim();if(!name){document.getElementById('rip-save-status').textContent='Please enter a name.';return;}
  var row={id:_ripId||Date.now(),user_id:uid(),name:name,url:document.getElementById('rip-url').value.trim(),notes:document.getElementById('rip-notes').value.trim(),carpet:_carpet};
  var ok=await dbUpsert('ripoffs',row,!!_ripId);
  if(!ok)return;
  if(_ripId)ripoffs=ripoffs.map(function(r){return r.id===_ripId?row:r;});else ripoffs.unshift(row);
  clearRipoffForm();document.getElementById('rip-save-status').textContent='Saved!';renderRipoffs();
}
function editRipoff(id){var r=ripoffs.find(function(x){return x.id===id;});if(!r)return;document.getElementById('rip-name').value=r.name;document.getElementById('rip-url').value=r.url||'';document.getElementById('rip-notes').value=r.notes||'';_ripId=id;selectCarpet(r.carpet);window.scrollTo(0,0);}
async function delRipoff(id){
  if(!confirm('Delete?'))return;
  var ok=await dbDelete('ripoffs',id);
  if(ok){ripoffs=ripoffs.filter(function(r){return r.id!==id;});renderRipoffs();}
}
function renderRipoffs(){
  document.getElementById('ripoffs-list').innerHTML=!ripoffs.length?'<div class="empty">No ripoffs yet.</div>':ripoffs.map(function(r){
    var ci=r.carpet===true?'&#10004;&#65039;':r.carpet===false?'&#10060;':'&#8212;';
    return '<div class="card"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+(r.url?'<a class="chn" href="'+esc(r.url)+'" target="_blank">'+esc(r.name)+'</a>':'<span class="ct">'+esc(r.name)+'</span>')+'<span class="cr">&#128955; Carpet: '+ci+'</span></div>'+(r.notes?'<div class="crv">'+esc(r.notes)+'</div>':'')+'<div class="ca"><button class="btn sm" onclick="editRipoff('+r.id+')">&#9999; Edit</button><button class="btn sm danger" onclick="delRipoff('+r.id+')">&#10005; Delete</button></div></div>';
  }).join('');
}

// ── FRIENDS ──────────────────────────────────────────────────────────────────
var friendsEntries=[];
var friendsLoaded=false;

async function loadFriendsData(){
  if(friendsLoaded)return;
  document.getElementById('friends-container').innerHTML='<div class="empty">Loading...</div>';
  // Load all entries from all users (requires read-all RLS policy)
  var r=await sbFetch('GET','entries?limit=1000',null);
  if(r.error||!r.data){
    document.getElementById('friends-container').innerHTML='<div class="empty">Could not load reviews. Error: '+(r.error?r.error.message:'no data')+'</div>';
    return;
  }
  // Try to load profiles - silently ignore if table doesn't exist
  var profileMap={};
  try{
    var rp=await sbFetch('GET','profiles?select=id,username,avatar_url',null);
    if(rp.data)(rp.data).forEach(function(p){profileMap[p.id]=p;});
  }catch(e){}
  friendsEntries=r.data.map(function(e){
    var prof=profileMap[e.user_id]||{};
    return {
      id:e.id,title:e.title,channel:e.channel||'',cat:e.cat||'',year:e.year||'',
      rating:e.rating||'',review:e.review||'',thumb:e.thumb||'',url:e.url||'',
      liked:e.liked,reviewedAt:e.reviewed_at,
      userId:e.user_id,
      username:prof.username||'Anonymous',
      avatarUrl:prof.avatar_url||''
    };
  });
  friendsLoaded=true;
  // Populate category filter
  var cats=Array.from(new Set(friendsEntries.map(function(e){return e.cat;}).filter(Boolean)));
  var catSel=document.getElementById('friends-cat');
  catSel.innerHTML='<option value="">All categories</option>'+cats.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join('');
  renderFriends();
}

function renderFriends(){
  var search=document.getElementById('friends-search').value.toLowerCase();
  var cat=document.getElementById('friends-cat').value;
  var sort=document.getElementById('friends-sort').value;
  var filtered=friendsEntries.filter(function(e){
    if(cat&&e.cat!==cat)return false;
    if(search&&(e.title+e.channel+(e.review||'')+(e.rating||'')+e.username).toLowerCase().indexOf(search)<0)return false;
    return true;
  });
  if(sort==='liked') filtered=filtered.filter(function(e){return e.liked===true;});
  else if(sort==='disliked') filtered=filtered.filter(function(e){return e.liked===false;});
  filtered.sort(function(a,b){return (b.reviewedAt||0)-(a.reviewedAt||0);});
  var con=document.getElementById('friends-container');
  if(!filtered.length){con.innerHTML='<div class="empty">No reviews found.</div>';return;}
  con.innerHTML=filtered.map(function(e){
    var isMe=e.userId===uid();
    var thumb=e.thumb?'<div class="thumb"><img src="'+esc(e.thumb)+'" onerror="this.parentElement.textContent=String.fromCodePoint(9654)"></div>':'<div class="thumb">&#9654;</div>';
    var title=e.url?'<a class="ct" href="'+esc(e.url)+'" target="_blank">'+esc(e.title)+'</a>':'<span class="ct">'+esc(e.title)+'</span>';
    var reviewedStr=e.reviewedAt?(' · '+new Date(e.reviewedAt).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})):'';
    var userBadge='<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:'+(isMe?'#1a2a3a':'#1e1e1e')+';border:1px solid '+(isMe?'#2a4a6a':'#2a2a2a')+';color:'+(isMe?'#7ab0e8':'#888')+'">'+(isMe?'You':esc(e.username))+'</span>';
    var lo=e.liked===true?' on':''; var dlo=e.liked===false?' on':'';
    return '<div class="card"><div class="card-top">'+thumb+'<div class="ci">'+title+'<div class="cm">'+esc(e.channel||'')+(e.year?' · '+e.year:'')+reviewedStr+'</div>'+(e.rating?'<span class="cr">'+esc(e.rating)+'</span>':'')+'</div></div>'+(e.review?'<div class="crv">'+esc(e.review)+'</div>':'')+'<div class="ca">'+userBadge+'<button class="lbtn'+lo+'" style="cursor:default">&#128077;</button><button class="dlbtn'+dlo+'" style="cursor:default">&#128078;</button></div></div>';
  }).join('');
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name){
  var tabs=['browse','add','series','history','channels','todo','other'];
  tabs.forEach(function(t){document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach(function(btn,i){btn.classList.toggle('active',tabs[i]===name);});
  if(name==='browse')renderAll();
  if(name==='series'){renderSeries();renderRGrid('s-rating-grid');renderCatSelect();}
  if(name==='history')renderHistory();
  if(name==='channels')renderChannels();
  if(name==='other')renderRipoffs();
  if(name==='friends'){friendsLoaded=false;loadFriendsData();}
}
